version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pet-shelter-postgres
    environment:
      POSTGRES_DB: petshelter
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - pet-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d petshelter"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  pet-shelter:
    build: .
    container_name: pet-shelter-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/petshelter
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_LIQUIBASE_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pet-network
    volumes:
      - ./target:/app/target

  pet-agent:
    build:
      context: pet-shelter-agent
    container_name: pet-shelter-agent
    environment:
      - API_URL=${API_URL}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      - OLLAMA_MODEL_NAME=${OLLAMA_MODEL_NAME}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL}
    depends_on:
      pet-shelter:
        condition: service_started
    stdin_open: true
    tty: true
    networks:
      - pet-network

volumes:
  postgres-data:

networks:
  pet-network:
    driver: bridge
