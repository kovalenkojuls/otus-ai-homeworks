# Spring application configuration
spring.application.name=pet-shelter
server.port=8080

# Database configuration
spring.datasource.url=jdbc:postgresql://postgres:5432/petshelter
spring.datasource.username=petshelter_user
spring.datasource.password=petshelter_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Liquibase configuration
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:/db/changelog/master.yaml

# Logging configuration
logging.level.root=INFO
logging.level.com.example.petshelter=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
